<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — GrowDirect</title>
<meta name="description" content="Get in touch about your next platform project.">
<meta property="og:title" content="Contact — GrowDirect">
<meta property="og:description" content="Get in touch about your next platform project.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://growdirect.io/contact.html">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELPTR2ZLP3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ELPTR2ZLP3');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
  .contact-wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 72px clamp(24px, 5vw, 48px) 96px;
  }

  .contact-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--canary);
    margin-bottom: 16px;
  }

  .contact-heading {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 40px;
  }

  .form-group {
    margin-bottom: 24px;
  }

  .form-group label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--canary);
  }

  .form-group textarea {
    min-height: 130px;
    resize: vertical;
    line-height: 1.6;
  }

  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: var(--text3);
  }

  .submit-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--canary) 0%, var(--amber) 100%);
    color: #0D1117;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 13px 32px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
    margin-top: 8px;
  }

  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .prefer-email {
    margin-top: 28px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  .prefer-email a {
    color: var(--text2);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s;
  }

  .prefer-email a:hover { color: var(--canary); }

  .success-msg {
    display: none;
    background: rgba(5,150,105,0.1);
    border: 1px solid rgba(5,150,105,0.3);
    padding: 20px 24px;
    margin-top: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #34D399;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .contact-footer {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text4);
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .contact-footer a {
    color: var(--text3);
    transition: color 0.2s;
  }

  .contact-footer a:hover { color: var(--canary); }
</style>
</head>
<body>

<!-- Nav -->
<nav class="doc-nav">
  <a href="/">&#8592; GrowDirect</a>
  <span class="doc-nav-title">Contact</span>
</nav>

<!-- Form -->
<div class="contact-wrap">
  <div class="contact-label">Get in touch</div>
  <h1 class="contact-heading" id="contact-heading">What are you building?</h1>

  <form id="contact-form" action="https://formspree.io/f/xbdqlakw" method="POST">
    <input type="hidden" id="source" name="_source" value="direct">

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label for="message">What are you working on?</label>
      <textarea id="message" name="message" required placeholder="Tell me about the project..."></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
  </form>

  <div class="success-msg" id="success-msg">
    Message received. I'll follow up within 24 hours.
  </div>

  <div class="prefer-email">
    Prefer email? <a href="mailto:gcgclyle@growdirect.io">gcgclyle@growdirect.io</a>
  </div>

  <footer class="contact-footer">
    <span>© 2026 GrowDirect DAO LLC</span>
    <a href="mailto:gcgclyle@growdirect.io">gcgclyle@growdirect.io</a>
  </footer>
</div>

<script>
  (function () {
    // Read ?from= query param
    const params = new URLSearchParams(window.location.search);
    const from = params.get('from') || '';
    const sourceField = document.getElementById('source');
    const heading = document.getElementById('contact-heading');

    const headlines = {
      canary: 'Interested in Canary?',
      investor: "Let's talk",
    };

    if (from) {
      sourceField.value = from;
      if (headlines[from]) {
        heading.textContent = headlines[from];
      }
    }

    // AJAX form submission
    const form = document.getElementById('contact-form');
    const btn = document.getElementById('submit-btn');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' },
        });

        if (res.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';

          if (typeof gtag !== 'undefined') {
            gtag('event', 'contact_form_submit', { source: sourceField.value });
          }
        } else {
          btn.disabled = false;
          btn.textContent = 'Send Message';
          alert('Something went wrong. Please email gcgclyle@growdirect.io directly.');
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Send Message';
        alert('Network error. Please email gcgclyle@growdirect.io directly.');
      }
    });
  })();
</script>

</body>
</html>
